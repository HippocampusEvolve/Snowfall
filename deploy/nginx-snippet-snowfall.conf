# Snowfall на пути /snowfall/ существующего сайта (реальная схема на
# antonov-ai.ru). Файлы: /var/www/games/snowfall (содержимое dist/).
# Подключение: строка `include snippets/snowfall.conf;` внутри server{}.

location = /snowfall { return 301 /snowfall/; }

location ^~ /snowfall/ {
    root /var/www/games;
    index index.html;

    # сжатие текстовых форматов на лету; webp/draco-bin уже сжаты
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/css application/javascript application/json
               model/gltf+json application/wasm image/svg+xml;

    # .gltf нет в mime.types — задаём JSON-тип, чтобы gzip его брал
    location ~* ^/snowfall/models/.+\.gltf$ {
        default_type model/gltf+json;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }
    # модели/текстуры/декодер: имена стабильные, кэш на неделю
    location ~* ^/snowfall/(models|textures|draco)/ {
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }
    # хэшированные бандлы Vite — кэш навечно
    location ~* ^/snowfall/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    # остальное (index.html) — без кэша: точка входа тянет свежие хэши
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ =404;
}
