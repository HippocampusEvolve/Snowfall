# Snowfall — конфиг nginx для раздачи статики (dist/ после `npm run build`).
# Положить в /etc/nginx/sites-available/snowfall, включить симлинком в
# sites-enabled, поправить server_name и root. HTTPS — добавить через certbot.

server {
    listen 80;
    listen [::]:80;
    server_name snowfall.example.com;   # <- заменить на свой домен или IP

    root /var/www/snowfall;             # <- сюда кладётся содержимое dist/
    index index.html;

    # --- сжатие на лету -------------------------------------------------
    # Текстовые форматы и gltf-JSON жмутся в разы. WebP/JPEG/draco-bin уже
    # сжаты — их gzip не трогает (нет в списке типов).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/css
        application/javascript
        application/json
        model/gltf+json
        application/wasm
        image/svg+xml;

    # gltf отдаём с правильным MIME (иначе nginx даст octet-stream и не сожмёт)
    types {
        model/gltf+json gltf;
        application/wasm wasm;
    }

    # --- кэширование ----------------------------------------------------
    # Хэшированные бандлы Vite — можно кэшировать навечно.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Модели/текстуры/декодер — кэш на год (immutable). ВАЖНО: при изменении
    # контента файла менять и имя (как snow_02_*.jpg → .webp в v0.15.2) —
    # иначе старые посетители будут видеть закэшированную версию до года.
    location ~ ^/(models|textures|draco)/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html не кэшируем — точка входа, тянет свежие хэши бандлов.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
